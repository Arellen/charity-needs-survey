<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公益小程序 · 项目计划</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    background:linear-gradient(135deg,#f0fdf4 0%,#ecfdf5 50%,#f8fafc 100%);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .wrap{max-width:520px;width:100%;text-align:center}
  .wrap .icon{font-size:64px;margin-bottom:16px}
  .wrap h1{font-size:28px;color:#065f46;margin-bottom:6px}
  .wrap .sub{font-size:14px;color:#6b7280;margin-bottom:36px}

  .cards{display:flex;flex-direction:column;gap:16px}
  .card{
    display:flex;align-items:center;gap:18px;
    background:#fff;border-radius:16px;padding:24px 28px;
    box-shadow:0 2px 12px rgba(0,0,0,0.06);border:1px solid #e5e7eb;
    text-decoration:none;color:inherit;
    transition:all 0.2s;cursor:pointer;
  }
  .card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.1);border-color:#10b981}
  .card .emoji{font-size:44px;flex-shrink:0}
  .card .info h3{font-size:18px;color:#1f2937;margin-bottom:4px}
  .card .info p{font-size:13px;color:#9ca3af;line-height:1.5}
  .card .arrow{font-size:22px;color:#d1d5db;margin-left:auto;flex-shrink:0}

  .footer{margin-top:40px;font-size:12px;color:#9ca3af}
  .footer a{color:#9ca3af}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">🤝</div>
  <h1>公益小程序项目</h1>
  <p class="sub">请选择您要查看的内容</p>

  <div class="cards">
    <a href="features.html" class="card">
      <span class="emoji">📖</span>
      <span class="info">
        <h3>功能介绍与效果展示</h3>
        <p>了解小程序能做什么，每个功能长什么样，直观查看参考界面效果</p>
      </span>
      <span class="arrow">→</span>
    </a>
    <a href="plan.html" class="card">
      <span class="emoji">📅</span>
      <span class="info">
        <h3>项目分阶段计划</h3>
        <p>第一阶段做什么、第二阶段做什么、哪些功能可选——清晰透明，随时对齐进度</p>
      </span>
      <span class="arrow">→</span>
    </a>
    <a href="survey.html" class="card">
      <span class="emoji">📋</span>
      <span class="info">
        <h3>需求选择问卷</h3>
        <p>逐项勾选贵机构需要的功能，提交后我们将据此出具开发方案和报价</p>
      </span>
      <span class="arrow">→</span>
    </a>
  </div>

  <p class="footer">点击上方卡片进入对应页面 · 信息仅用于方案评估</p>
</div>
</body>
</html>
