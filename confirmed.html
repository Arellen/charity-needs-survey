<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提交成功 · 公益小程序</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    background:#f0fdf4;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;
    padding:40px 20px;
  }
  .card{
    background:#fff;border-radius:16px;padding:40px 28px 28px;max-width:540px;width:100%;
    box-shadow:0 4px 20px rgba(0,0,0,.06);text-align:center;
  }
  .card .icon{font-size:56px;margin-bottom:12px}
  .card h2{color:#1a6b4b;margin-bottom:6px;font-size:22px}
  .card .project-tag{
    display:inline-block;background:#ecfdf5;color:#1a6b4b;padding:2px 12px;
    border-radius:12px;font-size:12px;margin-bottom:4px;
  }
  .card .id{font-size:12px;color:#9ca3af;margin-bottom:20px}
  .card .msg{font-size:15px;color:#6b7280;margin-bottom:20px;line-height:1.6}
  .card .summary{
    text-align:left;background:#f9fafb;border-radius:10px;padding:16px 18px;
    font-size:13px;color:#4b5563;line-height:1.8;max-height:250px;overflow-y:auto;
    margin-bottom:20px;
  }
  .card .tip{
    background:#fffbe6;border-radius:10px;padding:12px;font-size:12px;color:#92400e;
    border:1px solid #fde68a;margin-bottom:16px;
  }
  .card .actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .card .btn{
    display:inline-block;padding:10px 24px;border-radius:20px;text-decoration:none;
    font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .2s;
  }
  .btn-back{background:#1a6b4b;color:#fff}
  .btn-back:hover{background:#145a3e}
  .btn-edit{background:#fff;color:#1a6b4b;border:1px solid #1a6b4b!important}
  .btn-edit:hover{background:#ecfdf5}
  .btn-print{background:#fff;color:#6b7280;border:1px solid #e5e7eb!important}
  .btn-print:hover{background:#f9fafb}
  @media print{
    body{background:#fff}
    .btn-edit,.btn-print{display:none!important}
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h2>提交成功</h2>
  <div class="project-tag" id="projectTag"></div>
  <div class="id" id="refId"></div>
  <div class="msg">我们已收到您的需求，将在 <b>2 个工作日内</b> 与您联系。</div>
  <div class="summary" id="summary"></div>
  <div class="tip">📸 请截图保存此页面作为凭证<br>如有疑问，请回复飞书消息或联系对接人</div>
  <div class="actions">
    <a class="btn btn-back" href="index.html">🏠 返回首页</a>
    <a class="btn btn-edit" id="btnEdit" href="#">✏️ 修改提交</a>
    <button class="btn btn-print" onclick="window.print()">🖨️ 打印</button>
  </div>
</div>

<script>
(function(){
  var data = null;
  try { data = JSON.parse(sessionStorage.getItem('surveyResult')); } catch(e){}
  var lastSubmit = null;
  try { lastSubmit = JSON.parse(sessionStorage.getItem('surveyLastSubmit')); } catch(e){}

  // 项目信息
  if(lastSubmit){
    var names = {charity:'公益小程序'};
    document.getElementById('projectTag').textContent = (names[lastSubmit.project]||lastSubmit.project) + ' · ' + lastSubmit.ver;
    // P1-4: 修改按钮链接
    document.getElementById('btnEdit').href = 'survey.html?project=' + lastSubmit.project + '&ver=' + lastSubmit.ver + '&edit=1';
  }

  if(data){
    var d = new Date(data.time || Date.now());
    function p(n){ return (n<10?'0':'')+n; }
    var id = 'RQ' + d.getFullYear() + p(d.getMonth()+1) + p(d.getDate()) + '-' + p(d.getHours()) + p(d.getMinutes());
    document.getElementById('refId').textContent = '编号：' + id + ' | ' + d.toLocaleString('zh-CN');

    var lines = data.lines || [];
    var html = '';
    for(var i = 0; i < lines.length; i++){
      html += lines[i].replace(/\*\*/g,'') + '<br>';
    }
    document.getElementById('summary').innerHTML = html || '（无内容）';
  } else {
    document.getElementById('refId').textContent = '（无提交数据）';
    document.getElementById('summary').innerHTML = '请返回问卷页重新提交';
    document.getElementById('btnEdit').style.display = 'none';
  }
})();
</script>
</body>
</html>
